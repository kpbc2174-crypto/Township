name: Restructure Township Source

on:
  push:
    paths:
      - '.github/workflows/restructure-township.yml'

permissions:
  contents: write

jobs:
  restructure:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move canonical source folders
        run: |
          mkdir -p src archive/miner_exports archive/legacy_import_attempts docs/history/behavior_pack
          [ ! -d 'Township BP' ] || git mv 'Township BP' src/behavior_pack
          [ ! -d 'Township RP' ] || git mv 'Township RP' src/resource_pack
          [ ! -d import ] || git mv import archive/legacy_import_attempts/import
          for file in BedrockAddonMinerFullSource_* BedrockAddonMinerLibraryIndex_*; do [ -e "$file" ] && git mv "$file" archive/miner_exports/; done
          for file in src/behavior_pack/Township_CHANGELOG* src/behavior_pack/README_TOWNSHIP*; do [ -e "$file" ] && git mv "$file" docs/history/behavior_pack/; done
      - name: Commit source structure
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'Establish canonical Township source structure'
          git push
