name: Repair Township Refactor

on:
  push:
    paths:
      - .github/workflows/main.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Repair building-plan dependency wiring
        run: |
          python3 - <<'PY'
          from pathlib import Path

          runtime_path = Path("src/behavior_pack/scripts/app/runtime.js")
          plans_path = Path("src/behavior_pack/scripts/systems/building_plans.js")

          runtime = runtime_path.read_text(encoding="utf-8")
          plans = plans_path.read_text(encoding="utf-8")

          runtime_old = "  addBlockEntry,\n  lotPathOffset: LOT_PATH_OFFSET,"
          runtime_new = "  addBlockEntry,\n  hashStringNumber,\n  lotPathOffset: LOT_PATH_OFFSET,"
          if runtime_old not in runtime:
              raise SystemExit("Expected createBuildingPlans dependency block was not found in runtime.js")
          runtime = runtime.replace(runtime_old, runtime_new, 1)

          plans_old = "  addBlockEntry,\n  lotPathOffset,"
          plans_new = "  addBlockEntry,\n  hashStringNumber,\n  lotPathOffset,"
          if plans_old not in plans:
              raise SystemExit("Expected createBuildingPlans parameter block was not found in building_plans.js")
          plans = plans.replace(plans_old, plans_new, 1)

          old_variant = "hashStringNumber(lot?.id ?? tickCounter)"
          if old_variant not in plans:
              raise SystemExit("Expected auto-variant expression was not found in building_plans.js")
          plans = plans.replace(old_variant, 'hashStringNumber(lot?.id ?? "")', 1)

          runtime_path.write_text(runtime, encoding="utf-8")
          plans_path.write_text(plans, encoding="utf-8")
          PY

      - name: Verify repaired module links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          runtime = Path("src/behavior_pack/scripts/app/runtime.js").read_text(encoding="utf-8")
          plans = Path("src/behavior_pack/scripts/systems/building_plans.js").read_text(encoding="utf-8")

          if 'import { createBuildingPlans } from "../systems/building_plans.js";' not in runtime:
              raise SystemExit("runtime.js is missing building_plans import")
          if 'hashStringNumber,\n  lotPathOffset: LOT_PATH_OFFSET,' not in runtime:
              raise SystemExit("runtime.js is missing hashStringNumber dependency wiring")
          if 'hashStringNumber(lot?.id ?? "")' not in plans:
              raise SystemExit("building_plans.js auto-variant expression was not repaired")
          PY

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/behavior_pack/scripts/app/runtime.js src/behavior_pack/scripts/systems/building_plans.js
          if git diff --cached --quiet; then
            echo "No repair changes were needed."
            exit 0
          fi
          git commit -m "Repair Township building plan module wiring"
          git push origin HEAD:main
