name: Organize Township Source

on:
  push:
    paths:
      - '.github/workflows/organize-source.yml'

permissions:
  contents: write

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Organize source
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          bp = Path('src/behavior_pack')
          rp = Path('src/resource_pack')
          scripts = bp / 'scripts'
          main = scripts / 'main.js'

          if main.exists():
              text = main.read_text(encoding='utf-8')
              if text.strip() != 'import "./app/runtime.js";':
                  runtime = text.replace('import { sendDebugLogError } from "./debug_log_bridge.js";', 'import { sendDebugLogError } from "../shared/debug_log_bridge.js";')
                  runtime = runtime.replace('const ADDON_NAME = "Township";\nconst VERSION = "1.0.85";\n', 'import { ADDON_NAME, VERSION } from "../core/version.js";\n')
                  (scripts / 'app').mkdir(parents=True, exist_ok=True)
                  (scripts / 'app' / 'runtime.js').write_text(runtime, encoding='utf-8')
                  main.write_text('import "./app/runtime.js";\n', encoding='utf-8')

          bridge = scripts / 'debug_log_bridge.js'
          if bridge.exists():
              shared = scripts / 'shared'
              shared.mkdir(exist_ok=True)
              shutil.move(str(bridge), str(shared / 'debug_log_bridge.js'))

          core = scripts / 'core'
          core.mkdir(exist_ok=True)
          (core / 'version.js').write_text('export const ADDON_NAME = "Township";\nexport const VERSION = "1.0.85";\n', encoding='utf-8')

          for name, body in {
              'scripts/README.md': '# Township Scripts\n\n`main.js` is the only manifest entry point. It imports `app/runtime.js`.\n\n- `core/` holds versioning and future world-state modules.\n- `shared/` holds reusable utilities such as debug transport.\n- `systems/` is reserved for independent township systems.\n- `ui/` is reserved for form routing and form screens.\n',
              'scripts/systems/README.md': 'Future independent gameplay systems belong here. Do not move working runtime code here without a dedicated tested migration.\n',
              'scripts/ui/README.md': 'Future ActionFormData and ModalFormData routing belongs here.\n',
          }.items():
              path = bp / name
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(body, encoding='utf-8')

          shutil.rmtree('archive', ignore_errors=True)

          Path('docs/PROJECT_STRUCTURE.md').write_text('''# Township Project Structure\n\n## Source roots\n\n- `src/behavior_pack/` is the editable Behavior Pack source.\n- `src/resource_pack/` is the editable Resource Pack source.\n\nThe build tool packages those two roots as `Township BP/` and `Township RP/` inside the `.mcaddon`.\n\n## Script layout\n\n- `scripts/main.js` is the stable Script API entry point.\n- `scripts/app/runtime.js` contains the current runtime until individual systems are migrated.\n- `scripts/core/` is for versioning and shared project state.\n- `scripts/shared/` is for reusable helpers.\n- `scripts/systems/` is for township systems.\n- `scripts/ui/` is for forms.\n\n## Repository support\n\n- `docs/` stores project records.\n- `tools/` stores repeatable validation and packaging helpers.\n- `.github/workflows/` stores validation automation only.\n\nDo not store generated packages, Miner exports, Base64 dumps, or temporary import files in this repository.\n''', encoding='utf-8')

          Path('docs/DEVELOPMENT_WORKFLOW.md').write_text('''# Township Development Workflow\n\n1. Select one feature.\n2. Verify the Bedrock requirement.\n3. Change only the required files.\n4. Keep BP/RP UUIDs unchanged for normal updates.\n5. Update both pack versions and `scripts/core/version.js`.\n6. Validate source.\n7. Package the add-on.\n8. Test on the target Android Bedrock version.\n9. Record changed files, experiments, result, and Content Log output.\n\nDo not combine gameplay work with broad file reorganization.\n''', encoding='utf-8')

          Path('tools/validate_addon.py').write_text('''from __future__ import annotations\n\nimport json\nfrom pathlib import Path\n\nBP = Path("src/behavior_pack")\nRP = Path("src/resource_pack")\n\ndef load_json(path: Path):\n    try:\n        return json.loads(path.read_text(encoding="utf-8"))\n    except Exception as error:\n        raise SystemExit(f"Invalid JSON: {path}: {error}")\n\ndef main() -> None:\n    bp = load_json(BP / "manifest.json")\n    rp = load_json(RP / "manifest.json")\n    if rp["header"]["uuid"] not in {x.get("uuid") for x in bp.get("dependencies", [])}:\n        raise SystemExit("BP does not depend on the RP UUID.")\n    if bp["header"]["uuid"] not in {x.get("uuid") for x in rp.get("dependencies", [])}:\n        raise SystemExit("RP does not depend on the BP UUID.")\n    for root in (BP, RP):\n        for path in root.rglob("*.json"):\n            load_json(path)\n    print("Township JSON and BP/RP dependency validation passed.")\n\nif __name__ == "__main__":\n    main()\n''', encoding='utf-8')

          Path('tools/package_addon.py').write_text('''from __future__ import annotations\n\nimport json\nimport zipfile\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nSOURCE = ((ROOT / "src/behavior_pack", "Township BP"), (ROOT / "src/resource_pack", "Township RP"))\n\ndef main() -> None:\n    versions = [json.loads((root / "manifest.json").read_text(encoding="utf-8"))["header"]["version"] for root, _ in SOURCE]\n    if versions[0] != versions[1]:\n        raise SystemExit(f"BP/RP version mismatch: {versions}")\n    output = ROOT / "dist" / ("Township_v" + "_".join(map(str, versions[0])) + ".mcaddon")\n    output.parent.mkdir(exist_ok=True)\n    with zipfile.ZipFile(output, "w", zipfile.ZIP_DEFLATED) as archive:\n        for root, package_name in SOURCE:\n            for path in root.rglob("*"):\n                if path.is_file():\n                    archive.write(path, (Path(package_name) / path.relative_to(root)).as_posix())\n    print(output)\n\nif __name__ == "__main__":\n    main()\n''', encoding='utf-8')
          PY
      - name: Commit organization
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'Complete Township source organization'
          git push
