name: Build Township Add-On

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Increment pack version
        id: version
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          bp_path = Path("src/behavior_pack/manifest.json")
          rp_path = Path("src/resource_pack/manifest.json")
          bp = json.loads(bp_path.read_text(encoding="utf-8"))
          rp = json.loads(rp_path.read_text(encoding="utf-8"))

          current = bp["header"]["version"]
          if current != rp["header"]["version"]:
              raise SystemExit(f"BP/RP header version mismatch: {current} vs {rp['header']['version']}")
          if len(current) != 3 or not all(isinstance(part, int) for part in current):
              raise SystemExit(f"Invalid semantic version: {current}")

          next_version = [current[0], current[1], current[2] + 1]
          for manifest, own_uuid, linked_uuid in (
              (bp, bp["header"]["uuid"], rp["header"]["uuid"]),
              (rp, rp["header"]["uuid"], bp["header"]["uuid"]),
          ):
              manifest["header"]["version"] = next_version
              manifest["header"]["description"] = f"Township v{'.'.join(map(str, next_version))} stable Script API update"
              for module in manifest.get("modules", []):
                  module["version"] = next_version
              for dependency in manifest.get("dependencies", []):
                  if dependency.get("uuid") == linked_uuid:
                      dependency["version"] = next_version

          bp_path.write_text(json.dumps(bp, indent=2) + "\n", encoding="utf-8")
          rp_path.write_text(json.dumps(rp, indent=2) + "\n", encoding="utf-8")

          version = ".".join(map(str, next_version))
          filename = "Township_v" + "_".join(map(str, next_version)) + ".mcaddon"
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"filename={filename}\n")
          PY

      - name: Check script syntax
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find src/behavior_pack/scripts -type f -name '*.js' -print0)

      - name: Build versioned mcaddon
        run: |
          rm -rf dist staging
          mkdir -p "staging/Township BP" "staging/Township RP" dist
          cp -a src/behavior_pack/. "staging/Township BP/"
          cp -a src/resource_pack/. "staging/Township RP/"
          (
            cd staging
            zip -qr "../dist/${{ steps.version.outputs.filename }}" "Township BP" "Township RP"
          )
          test -s "dist/${{ steps.version.outputs.filename }}"

      - name: Upload versioned mcaddon
        uses: actions/upload-artifact@v4
        with:
          name: Township-v${{ steps.version.outputs.version }}
          path: dist/${{ steps.version.outputs.filename }}
          if-no-files-found: error
          retention-days: 14

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/behavior_pack/manifest.json src/resource_pack/manifest.json
          git commit -m "Bump Township to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
